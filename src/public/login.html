<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - Vibe Coding</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>Vibe Coding</h1>
        <p>Masuk ke akun kamu</p>
      </div>

      <div id="alert" class="alert alert-error hidden"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="email@localhost" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="rahasia" required>
        </div>

        <button type="submit" class="btn btn-primary">Masuk</button>
      </form>

      <div class="link">
        Belum punya akun? <a href="/register.html">Daftar sekarang</a>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alert = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/users/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.data);
          window.location.href = '/dashboard.html';
        } else {
          alert.textContent = data.error;
          alert.classList.remove('hidden');
        }
      } catch (err) {
        alert.textContent = 'Terjadi kesalahan';
        alert.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
